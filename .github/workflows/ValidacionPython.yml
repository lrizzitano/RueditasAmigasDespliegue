name: Validate PlantUML Diagram

on:
  push:
    branches:
      - main
    paths:
      - "diagrams/*.puml"
      - "validate.py"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run validator
        run: python3 scripts/validate.py