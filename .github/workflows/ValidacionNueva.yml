# This is a GitHub Workflow configuration
# Sytnax reference: https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions

name: Plant UML Diagram Generator

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest
    #    Check to make sure the commit doesn't contain "ci-skip"
    if: "!contains(github.event.head_commit.message, 'ci-skip')"
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2

      - name: Validate Diagram Relations
        run: |
          echo "Validating mandatory relationships with Regex..."
          MISSING=0
          
          # Array de expresiones regulares para validar la arquitectura
          # Usamos \s* para permitir espacios variables y \.\.> para los puntos
          RELATIONS=(
            '\"[^"]*\"[[:space:]]*-->[[:space:]]*\"[^"]*\"[[:space:]]*:[[:space:]]*HTTP'
            '\"[^"]*\"[[:space:]]*-->[[:space:]]*\"[^"]*\"[[:space:]]*:[[:space:]]*JDBC'
            '\"[^"]*\"[[:space:]]*-->[[:space:]]*\"[^"]*\"[[:space:]]*:[[:space:]]*TCPIP'
          )
          
          for rel in "${RELATIONS[@]}"; do
          # -r: recursivo
          # -q: modo silencioso
          # -E: Extended Regex
          if ! grep -rqE "$rel" diagrams/; then
          echo "❌ CRITICAL: Missing relation matching pattern: $rel"
            MISSING=$((MISSING+1))
            fi
            done
            
            if [ $MISSING -ne 0 ]; then
          echo "Validation failed: $MISSING relations missing."
            exit 1
            fi
            echo "✅ All regex patterns validated successfully."

      - name: Generate PlantUML Diagrams
        uses: Timmy/plantuml-action@v1
        with:
          # These arguments go directly to the `plantuml` command. Output directory is relative to input. Reference: https://plantuml.com/command-line
          args: 'diagrams/*.puml -o ../output/'

      - name: Commit & Push Changes
        run: |
          # Before attempting to commit changes, make sure something has changed
          if [[ `git status --porcelain` ]]; then
              git config --local user.email "action@github.com"
              git config --local user.name "GitHub Action"
              git add output/
              git commit -am "[ci-skip] Push changes"
              git push
          fi